name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build and Test
      run: ./gradlew build test
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: build/libs/*.jar
